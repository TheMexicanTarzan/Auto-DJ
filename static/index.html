<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-DJ Mix Pathfinder</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Auto-DJ Mix Pathfinder</h1>
    <p id="header-stats">Loading tracks...</p>
  </header>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <h2>Analysing your music library...</h2>
    <div class="progress-track">
      <div class="progress-fill" id="progress-bar"></div>
    </div>
    <p id="progress-text">Starting up...</p>
  </div>

  <!-- Main content (hidden until graph ready) -->
  <div id="main-content">
    <!-- Left sidebar with tabbed navigation -->
    <aside>

      <div class="tab-nav">
        <button class="tab-btn active" data-tab="track-details">Track Details</button>
        <button class="tab-btn" data-tab="pathfinding">Pathfinding</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
      </div>

      <!-- Tab 1: Track Details -->
      <div class="tab-panel active" id="tab-track-details">
        <label for="details-search">Search by name</label>
        <div class="search-wrapper">
          <input type="text" id="details-search" placeholder="Search for a track..." autocomplete="off">
          <div class="search-results" id="details-results"></div>
        </div>
        <label for="top-k-input">Neighbours to show</label>
        <input type="number" id="top-k-input" value="10" min="1" max="50">
        <div id="node-details"><p class="output-msg">Click a node on the graph or search above.</p></div>
      </div>

      <!-- Tab 2: Pathfinding -->
      <div class="tab-panel" id="tab-pathfinding">
        <label for="start-search">Start Song</label>
        <div class="search-wrapper">
          <input type="text" id="start-search" placeholder="Search for a track..." autocomplete="off">
          <div class="search-results" id="start-results"></div>
        </div>

        <!-- Dynamically inserted waypoint rows land here -->
        <div id="waypoints-container"></div>

        <button id="add-waypoint-btn">+ Add Song</button>

        <label for="end-search">Destination Song</label>
        <div class="search-wrapper">
          <input type="text" id="end-search" placeholder="Search for a track..." autocomplete="off">
          <div class="search-results" id="end-results"></div>
        </div>

        <button id="find-path-btn">Find Path</button>

        <div id="path-output"><p class="output-msg">Select songs and click Find Path.</p></div>
      </div>

      <!-- Tab 3: Settings -->
      <div class="tab-panel" id="tab-settings">

        <!-- Section A: Directory Filter -->
        <div class="settings-section" id="settings-dir-section">
          <div class="settings-section-title">Directory Filter</div>
          <div id="directory-filter">
            <div id="directory-tree"></div>
          </div>
        </div>

        <!-- Section B: Connection Filter -->
        <div class="settings-section">
          <div class="settings-section-title">Connection Filter</div>
          <div id="connection-filter">
            <label><input type="checkbox" id="filter-direct" checked> Direct</label>
            <label><input type="checkbox" id="filter-triplet" checked> Triplet</label>
            <label><input type="checkbox" id="filter-double" checked> Double</label>
          </div>
        </div>

      </div>

    </aside>

    <!-- Graph container -->
    <div id="sigma-container"></div>
  </div>

  <!-- Dependencies from CDN (no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sigma@2.4.0/build/sigma.min.js"></script>

  <!-- App logic -->
  <script src="/static/app.js"></script>
</body>
</html>
